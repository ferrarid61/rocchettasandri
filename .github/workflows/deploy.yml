name: 🚀 Deploy to rocchettasandri.it

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy via FTP
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 🚀 Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          server-dir: ${{ secrets.FTP_PATH }}
          exclude: |
            **/.git/**
            **/.gitignore
            **/.github/**
            **/.claude/**
            **/CLAUDE.md
            **/README.md
            **/.ftp-deploy-sync
            **/node_modules/**
